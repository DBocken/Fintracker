name: CI

on:
  push:
  pull_request:

jobs:
  quality:
    name: Lint, Typecheck & Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.12.4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm exec tsc --noEmit

      - name: Tests
        run: pnpm test

      - name: Red-team regression suites
        run: |
          pnpm test:security
          pnpm test:integrity
          pnpm test:privacy
          pnpm test:mobile

      - name: Secret scan
        run: pnpm security:secrets
